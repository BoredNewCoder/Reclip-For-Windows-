<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReClip — Free Media Downloader</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1eb;
      --fg: #3a3a38;
      --accent: #e85d2a;
      --accent-hover: #d04e1f;
      --muted: #9c9889;
      --card: #fff;
      --card-border: #e2ded6;
      --success: #2d8a4e;
      --error: #c43d3d;
      --radius: 14px;
      --shimmer: linear-gradient(90deg, #ebe8e2 25%, #f0ede7 50%, #ebe8e2 75%);
    }
    [data-theme="dark"] {
      --bg: #181816;
      --fg: #e8e5df;
      --accent: #e85d2a;
      --accent-hover: #f06b35;
      --muted: #68675f;
      --card: #222220;
      --card-border: #333330;
      --success: #3ba35e;
      --error: #e05555;
      --shimmer: linear-gradient(90deg, #2a2a28 25%, #303030 50%, #2a2a28 75%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.2s, color 0.2s;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    .page {
      max-width: 620px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    .brand { margin-bottom: 48px; position: relative; }
    .brand h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 4.2rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--fg);
    }
    .brand h1 em { font-style: italic; color: var(--accent); }
    .brand p {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .theme-toggle {
      position: absolute;
      top: 0; right: 0;
      width: 36px; height: 36px;
      border: 1.5px solid var(--card-border);
      border-radius: 10px;
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .theme-toggle:hover { border-color: var(--fg); color: var(--fg); }
    .theme-toggle svg { width: 15px; height: 15px; }

    textarea {
      width: 100%;
      padding: 18px 20px;
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      outline: none;
      resize: none;
      min-height: 56px;
      max-height: 240px;
      overflow-y: auto;
      transition: border-color 0.25s, box-shadow 0.25s;
      margin-bottom: 6px;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 93, 42, 0.08);
    }
    textarea::placeholder { color: var(--muted); }

    .hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 6px;
      align-items: center;
    }
    .pill-group {
      display: flex;
      border: 1.5px solid var(--card-border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
    }
    .pill {
      padding: 9px 18px;
      font-family: 'DM Mono', monospace;
      font-size: 0.76rem;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .pill.active { background: var(--fg); color: var(--bg); }
    .pill:not(.active):hover { color: var(--fg); }

    .fetch-btn {
      flex: 1;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .fetch-btn:hover { background: var(--accent-hover); }
    .fetch-btn:active { transform: scale(0.98); }
    .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Cards */
    .cards { margin-top: 24px; }

    .card {
      display: flex;
      gap: 14px;
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 14px;
      margin-bottom: 10px;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-thumb {
      width: 120px;
      min-width: 120px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--card-border);
      flex-shrink: 0;
      position: relative;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.35) 100%);
      pointer-events: none;
      border-radius: 8px;
    }
    /* No-thumbnail icon */
    .card-thumb .no-thumb {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }
    .card-thumb .no-thumb svg {
      width: 28px;
      height: 28px;
      opacity: 0.5;
    }

    /* Shimmer skeleton for loading state */
    .card-thumb.loading {
      background: var(--shimmer);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 4px;
      background: var(--shimmer);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 6px;
    }
    .skeleton-line.short { width: 40%; height: 10px; }
    .skeleton-line.medium { width: 75%; }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 1rem;
      line-height: 1.3;
      color: var(--fg);
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-meta {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .card-dl-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 7px;
      background: var(--fg);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .card-dl-btn:hover { background: #2d2d2a; }
    .card-dl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .card-dl-btn.done { background: var(--success); color: #fff; }
    .card-dl-btn.error { background: var(--error); color: #fff; }

    .card-status {
      font-size: 0.68rem;
      color: var(--muted);
    }
    .card-status.downloading { color: var(--accent); }
    .card-status.done { color: var(--success); }
    .card-status.error { color: var(--error); }

    /* Indeterminate download progress bar */
    .dl-progress {
      width: 100%;
      height: 3px;
      background: var(--card-border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 6px;
    }
    .dl-progress-bar {
      height: 100%;
      width: 40%;
      background: var(--accent);
      border-radius: 2px;
      animation: indeterminate 1.4s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0% { transform: translateX(-200%); }
      100% { transform: translateX(350%); }
    }

    .q-chip {
      padding: 4px 10px;
      border: 1.5px solid var(--card-border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .q-chip.active {
      border-color: var(--fg);
      color: var(--fg);
      background: rgba(26,26,24,0.04);
    }
    .q-chip:hover:not(.active) { border-color: var(--muted); }

    /* Error card */
    .card.card-error {
      border-color: rgba(196, 61, 61, 0.2);
      background: rgba(196, 61, 61, 0.03);
    }
    .card-error-icon {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(196, 61, 61, 0.08);
      color: var(--error);
    }
    .card-error-icon svg {
      width: 24px;
      height: 24px;
    }
    .card-error-msg {
      font-size: 0.72rem;
      color: var(--error);
      margin-top: 2px;
      line-height: 1.4;
    }
    .card-error-url {
      font-size: 0.65rem;
      color: var(--muted);
      word-break: break-all;
      margin-top: 4px;
    }

    /* Download all bar */
    .dl-all-bar {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .dl-all-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: var(--fg);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .dl-all-btn:hover { background: #2d2d2a; }
    .dl-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .spin {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 56px 0 24px;
      color: var(--muted);
    }
    .empty-state svg {
      width: 44px; height: 44px;
      opacity: 0.25;
      margin: 0 auto 14px;
      display: block;
    }
    .empty-state p {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* Footer platform chips */
    .footer {
      margin-top: 48px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }
    .platform-chip {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 9px;
      border: 1px solid var(--card-border);
      border-radius: 20px;
      transition: border-color 0.2s, color 0.2s;
    }
    .platform-chip:hover { border-color: var(--muted); color: var(--fg); }

    .cookie-badge {
      position: relative;
      width: 38px;
      height: 38px;
      border: 1.5px solid var(--card-border);
      border-radius: 10px;
      background: var(--card);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }
    .cookie-badge:hover { border-color: var(--fg); }
    .cookie-badge.active { border-color: rgba(45,138,78,0.4); }
    .cookie-badge svg { width: 16px; height: 16px; color: var(--muted); }
    .cookie-badge.active svg { color: var(--success); }
    .cookie-badge-dot {
      position: absolute;
      top: 5px; right: 5px;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }
    .cookie-badge.active .cookie-badge-dot { background: var(--success); }

    .cookie-panel {
      display: none;
      margin-top: 8px;
      padding: 12px 14px;
      border: 1.5px solid var(--card-border);
      border-radius: 10px;
      background: var(--card);
      font-size: 0.72rem;
      color: var(--muted);
    }
    .cookie-panel.open { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .cookie-panel.active {
      border-color: rgba(45,138,78,0.3);
      background: rgba(45,138,78,0.04);
      color: var(--success);
    }
    .cookie-panel-label { flex: 1; }
    .cookie-btn {
      padding: 5px 12px;
      border: 1.5px solid var(--card-border);
      border-radius: 7px;
      background: transparent;
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .cookie-btn:hover { border-color: var(--fg); }
    .cookie-btn.primary { background: var(--fg); color: var(--bg); border-color: var(--fg); }
    .cookie-btn.primary:hover { background: #2d2d2a; }
    .cookie-btn.danger { color: var(--error); border-color: rgba(196,61,61,0.3); }
    .cookie-btn.danger:hover { border-color: var(--error); }
    #cookieUploadInput { display: none; }

    /* Mobile */
    @media (max-width: 500px) {
      .brand h1 { font-size: 3rem; }
      .page { padding: 40px 16px 60px; }
      .card { flex-direction: column; gap: 10px; }
      .card-thumb {
        width: 100%;
        min-width: unset;
        height: 160px;
      }
      .card-title { white-space: normal; }
      .controls { flex-wrap: wrap; }
      .fetch-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="brand">
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle dark/light mode"></button>
      <h1>Re<em>Clip</em></h1>
      <p>Free media downloader</p>
    </div>

    <textarea id="urls" placeholder="Paste one or more URLs..." rows="2"></textarea>
    <p class="hint">Multiple links? Separate with spaces, commas, or newlines.</p>

    <div class="controls">
      <div class="pill-group">
        <button class="pill active" data-format="video" onclick="setFormat(this)">MP4</button>
        <button class="pill" data-format="audio" onclick="setFormat(this)">MP3</button>
      </div>
      <button class="fetch-btn" id="goBtn" onclick="go()">Fetch</button>
      <button class="cookie-badge" id="cookieBadge" onclick="toggleCookiePanel()" title="Cookie settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/><circle cx="15" cy="11" r="1" fill="currentColor" stroke="none"/><circle cx="11" cy="16" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
        <span class="cookie-badge-dot"></span>
      </button>
    </div>

    <div id="cookiePanel" class="cookie-panel">
      <input type="file" id="cookieUploadInput" accept=".txt">
    </div>

    <div id="cards" class="cards">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="3"/>
          <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
        </svg>
        <p>Paste a URL above to get started</p>
      </div>
    </div>

    <div class="footer">
      <span class="platform-chip">YouTube</span>
      <span class="platform-chip">TikTok</span>
      <span class="platform-chip">Instagram</span>
      <span class="platform-chip">Twitter/X</span>
      <span class="platform-chip">Reddit</span>
      <span class="platform-chip">Facebook</span>
      <span class="platform-chip">Vimeo</span>
      <span class="platform-chip">Twitch</span>
      <span class="platform-chip">Dailymotion</span>
      <span class="platform-chip">SoundCloud</span>
      <span class="platform-chip">Loom</span>
      <span class="platform-chip">Streamable</span>
      <span class="platform-chip">Pinterest</span>
      <span class="platform-chip">Tumblr</span>
      <span class="platform-chip">Threads</span>
      <span class="platform-chip">LinkedIn</span>
      <span class="platform-chip">1000+ more</span>
    </div>
  </div>

  <script>
    let currentFormat = 'video';
    let cardData = [];

    // Theme toggle
    const SUN_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
    const MOON_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

    function updateThemeIcon() {
      const btn = document.getElementById('themeToggle');
      if (!btn) return;
      btn.innerHTML = document.documentElement.dataset.theme === 'dark' ? SUN_SVG : MOON_SVG;
    }

    function toggleTheme() {
      const isDark = document.documentElement.dataset.theme === 'dark';
      const next = isDark ? 'light' : 'dark';
      document.documentElement.dataset.theme = isDark ? '' : 'dark';
      localStorage.setItem('theme', next);
      updateThemeIcon();
    }

    // Init: restore saved theme or respect OS preference
    (function initTheme() {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark') {
        document.documentElement.dataset.theme = 'dark';
      } else if (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.dataset.theme = 'dark';
      }
      updateThemeIcon();
    })();

    function setFormat(btn) {
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFormat = btn.dataset.format;
    }

    function parseUrls(text) {
      return [...new Set(text.split(/[\s,]+/).map(u => u.trim()).filter(u => u.startsWith('http')))];
    }

    function fmtDur(s) {
      if (!s) return '';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function friendlyError(err) {
      if (err.includes('Unsupported URL')) return 'This URL is not supported';
      if (err.includes('Video unavailable')) return 'Video is unavailable or private';
      if (err.includes('Private video')) return 'This video is private';
      if (err.includes('HTTP Error 403')) return 'Access denied — try adding a cookies.txt file';
      if (err.includes('HTTP Error 404')) return 'Video not found';
      if (err.includes('copyright')) return 'Video blocked due to copyright';
      if (err.includes('geo')) return 'Video not available in your region';
      if (err.includes('timed out') || err.includes('Timed out')) return 'Request timed out — try again';
      if (err.includes('network') || err.includes('Network')) return 'Network error — check your connection';
      if (err.includes('DRM') || err.includes('drm')) return 'DRM-protected — add cookies.txt for age-restricted content, or this is Widevine-encrypted (undownloadable)';
      if (err.includes('Sign in') || err.includes('login')) return 'Login required — add a cookies.txt file from your browser';
      return err.length > 80 ? err.slice(0, 80) + '...' : err;
    }

    const urlsEl = document.getElementById('urls');
    urlsEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
    });
    urlsEl.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = this.scrollHeight + 'px';
    });

    async function go() {
      const urls = parseUrls(document.getElementById('urls').value);
      if (!urls.length) return;

      const btn = document.getElementById('goBtn');
      const container = document.getElementById('cards');
      btn.disabled = true;
      btn.textContent = 'Loading...';
      container.innerHTML = '';
      cardData = [];

      for (let i = 0; i < urls.length; i++) {
        const url = urls[i];
        const idx = cardData.length;
        cardData.push({ url, status: 'loading' });
        renderCard(idx);

        try {
          const res = await fetch('/api/info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });
          const data = await res.json();
          if (data.error) {
            cardData[idx] = { ...cardData[idx], status: 'info-error', error: data.error };
          } else {
            cardData[idx] = {
              ...cardData[idx],
              status: 'ready',
              title: data.title || '',
              thumbnail: data.thumbnail || '',
              duration: data.duration,
              uploader: data.uploader || '',
              source: data.source || '',
              formats: data.formats || [],
              selectedFormatId: data.formats?.[0]?.id || null,
            };
          }
        } catch (err) {
          cardData[idx] = { ...cardData[idx], status: 'info-error', error: err.message };
        }
        renderCard(idx);
      }

      if (cardData.filter(c => c.status === 'ready').length > 1) {
        renderDownloadAll();
      }

      btn.disabled = false;
      btn.textContent = 'Fetch';
    }

    function renderCard(idx) {
      const c = cardData[idx];
      let el = document.getElementById(`card-${idx}`);
      if (!el) {
        el = document.createElement('div');
        el.id = `card-${idx}`;
        el.className = 'card';
        document.getElementById('cards').appendChild(el);
      }

      if (c.status === 'loading') {
        el.className = 'card';
        el.innerHTML = `
          <div class="card-thumb loading"></div>
          <div class="card-body">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line short"></div>
          </div>
        `;
        return;
      }

      if (c.status === 'info-error') {
        el.className = 'card card-error';
        el.innerHTML = `
          <div class="card-thumb">
            <div class="card-error-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
          </div>
          <div class="card-body">
            <div class="card-title" style="color:var(--error)">Could not fetch video</div>
            <div class="card-error-msg">${esc(friendlyError(c.error || ''))}</div>
            <div class="card-error-url">${esc(c.url)}</div>
          </div>
        `;
        return;
      }

      el.className = 'card';
      const isAudio = currentFormat === 'audio';

      let thumbHtml;
      if (isAudio) {
        thumbHtml = `<div class="no-thumb" style="color:var(--accent)"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`;
      } else if (c.thumbnail) {
        thumbHtml = `<img src="${c.thumbnail}" alt="">`;
      } else {
        thumbHtml = `<div class="no-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><circle cx="8" cy="8" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;
      }

      let qualityChips = '';
      if (!isAudio && c.formats && c.formats.length > 1) {
        qualityChips = c.formats.map(f =>
          `<button class="q-chip${f.id === c.selectedFormatId ? ' active' : ''}" onclick="pickFormat(${idx}, '${f.id}')">${f.label}</button>`
        ).join('');
      }

      let actionHtml = '';
      if (c.status === 'ready') {
        actionHtml = `<button class="card-dl-btn" onclick="dlCard(${idx})">Download</button>${qualityChips}`;
      } else if (c.status === 'downloading') {
        const progress = c.progress || 0;
        actionHtml = `
          <span class="card-status downloading"><span class="spin"></span> Downloading... ${progress.toFixed(0)}%</span>
          <progress value="${progress}" max="100" style="width:100%;height:4px;border:none;border-radius:2px;margin-top:6px;accent-color:var(--accent)"></progress>
        `;
      } else if (c.status === 'done') {
        actionHtml = `<span class="card-status done">Saved → downloads/${esc(c.filename || '')}</span>`;
      } else if (c.status === 'error') {
        actionHtml = `<button class="card-dl-btn" onclick="dlCard(${idx})">Retry</button>
          <span class="card-status error">${esc(friendlyError(c.error || 'Download failed'))}</span>`;
      }

      el.innerHTML = `
        <div class="card-thumb">${thumbHtml}</div>
        <div class="card-body">
          <div class="card-title">${esc(c.title || 'Untitled')}</div>
          <div class="card-meta">${c.source ? esc(c.source) + ' · ' : ''}${c.uploader ? esc(c.uploader) + (c.duration ? ' · ' : '') : ''}${c.duration ? fmtDur(c.duration) : ''}</div>
          <div class="card-actions">${actionHtml}</div>
        </div>
      `;
    }

    function renderDownloadAll() {
      const existing = document.getElementById('dl-all-bar');
      if (existing) existing.remove();

      const bar = document.createElement('div');
      bar.id = 'dl-all-bar';
      bar.className = 'dl-all-bar';
      bar.innerHTML = `<button class="dl-all-btn" onclick="dlAll()">Download All</button>`;
      document.getElementById('cards').appendChild(bar);
    }

    function pickFormat(idx, formatId) {
      cardData[idx].selectedFormatId = formatId;
      renderCard(idx);
    }

    async function dlCard(idx) {
      const c = cardData[idx];
      c.status = 'downloading';
      c.error = null;
      renderCard(idx);

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: c.url,
            format: currentFormat,
            format_id: c.selectedFormatId,
            title: c.title || '',
            uploader: c.uploader || '',
            source: c.source || '',
          }),
        });
        const data = await res.json();
        if (data.error) {
          c.status = 'error';
          c.error = data.error;
          renderCard(idx);
          return;
        }
        c.jobId = data.job_id;
        pollCard(idx);
      } catch (err) {
        c.status = 'error';
        c.error = err.message;
        renderCard(idx);
      }
    }

    function pollCard(idx) {
      const c = cardData[idx];
      const iv = setInterval(async () => {
        try {
          const res = await fetch(`/api/status/${c.jobId}`);
          const data = await res.json();
          if (data.status === 'done') {
            clearInterval(iv);
            c.status = 'done';
            c.filename = data.filename;
            c.progress = 100;
            renderCard(idx);
          } else if (data.status === 'error') {
            clearInterval(iv);
            c.status = 'error';
            c.error = data.error;
            renderCard(idx);
          } else if (data.status === 'downloading') {
            c.progress = data.progress || 0;
            renderCard(idx);
          }
        } catch {
          clearInterval(iv);
          c.status = 'error';
          c.error = 'Lost connection to server';
          renderCard(idx);
        }
      }, 1000);
    }

    let cookiePanelOpen = false;

    function toggleCookiePanel() {
      cookiePanelOpen = !cookiePanelOpen;
      const panel = document.getElementById('cookiePanel');
      if (cookiePanelOpen) panel.classList.add('open');
      else panel.classList.remove('open');
    }

    async function loadCookieStatus() {
      const badge = document.getElementById('cookieBadge');
      const panel = document.getElementById('cookiePanel');
      try {
        const res = await fetch('/api/cookies/status');
        const data = await res.json();

        panel.innerHTML = '';

        const lbl = document.createElement('span');
        lbl.className = 'cookie-panel-label';

        if (data.active) {
          badge.className = 'cookie-badge active';
          panel.className = cookiePanelOpen ? 'cookie-panel open active' : 'cookie-panel active';
          lbl.textContent = 'Cookies active — age-restricted & subscriber content unlocked';
          panel.appendChild(lbl);
          const clearBtn = document.createElement('button');
          clearBtn.className = 'cookie-btn danger';
          clearBtn.textContent = 'Remove';
          clearBtn.onclick = clearCookies;
          panel.appendChild(clearBtn);
        } else {
          badge.className = 'cookie-badge';
          panel.className = cookiePanelOpen ? 'cookie-panel open' : 'cookie-panel';
          lbl.textContent = 'No cookies — some videos may be blocked';
          panel.appendChild(lbl);
          if (data.firefox_available) {
            const ffBtn = document.createElement('button');
            ffBtn.className = 'cookie-btn primary';
            ffBtn.textContent = 'Import Firefox';
            ffBtn.onclick = importFromFirefox;
            panel.appendChild(ffBtn);
          }
          const uploadBtn = document.createElement('button');
          uploadBtn.className = 'cookie-btn';
          uploadBtn.textContent = 'Upload .txt';
          uploadBtn.onclick = () => panel.querySelector('input[type=file]').click();
          panel.appendChild(uploadBtn);
        }

        const newInput = document.createElement('input');
        newInput.type = 'file';
        newInput.id = 'cookieUploadInput';
        newInput.accept = '.txt';
        newInput.style.display = 'none';
        newInput.onchange = () => uploadCookieFile(newInput);
        panel.appendChild(newInput);
      } catch { /* silently ignore */ }
    }

    async function importFromFirefox() {
      try {
        const res = await fetch('/api/cookies/from-firefox', { method: 'POST' });
        const data = await res.json();
        if (data.error) alert('Import failed: ' + data.error);
        loadCookieStatus();
      } catch {
        alert('Import failed — is the server running?');
      }
    }

    async function uploadCookieFile(input) {
      const file = input.files[0];
      if (!file) return;
      const form = new FormData();
      form.append('file', file);
      const res = await fetch('/api/cookies/upload', { method: 'POST', body: form });
      const data = await res.json();
      if (data.error) alert('Upload failed: ' + data.error);
      input.value = '';
      loadCookieStatus();
    }

    async function clearCookies() {
      await fetch('/api/cookies/clear', { method: 'POST' });
      loadCookieStatus();
    }

    loadCookieStatus();

    async function dlAll() {
      const btn = document.querySelector('.dl-all-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Downloading...'; }

      const promises = cardData.map((c, i) => cardData[i].status === 'ready' ? dlCard(i) : Promise.resolve());
      await Promise.all(promises);

      if (btn) { btn.disabled = false; btn.textContent = 'Download All'; }
    }
  </script>
</body>
</html>
